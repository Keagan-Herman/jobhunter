name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - name: Use Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: 'npm'
    - run: npm install
    - name: Run tests
      run: npm test
      env:
        GROQ_API_KEY: ${{ secrets.GROQ_API_KEY || 'mock' }}
        ADZUNA_APP_ID: ${{ secrets.ADZUNA_APP_ID || 'mock' }}
        ADZUNA_API_KEY: ${{ secrets.ADZUNA_API_KEY || 'mock' }}
        JSEARCH_API_KEY: ${{ secrets.JSEARCH_API_KEY || 'mock' }}
        RESEND_API_KEY: ${{ secrets.RESEND_API_KEY || 'mock' }}
